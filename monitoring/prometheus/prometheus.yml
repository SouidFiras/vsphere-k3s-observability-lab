global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'put your node-exporter hosts here , in this case i had 3 (ip and ports)'
          - 'put your node-exporter hosts here , in this case i had 3'
          - 'put your node-exporter hosts here , in this case i had 3'

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets:
          - 'put your kube-state-metrics hosts here (ip and port)'
  - job_name: 'vsphere-exporter'
    static_configs:
      - targets:
          - 'put your vSphere exporter host here (ip and port)'
